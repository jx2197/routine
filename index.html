<style>
:root{--dark:#111827;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--bg:#f6f7fb;--muted:#6b7280}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:#111}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}#app{min-height:100vh;background:var(--bg)}
.top{height:26px;background:var(--dark)}.tabs{display:flex;gap:8px;overflow-x:auto;background:#fff;padding:10px;border-bottom:1px solid #ddd}

.moodRow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}.moodBtn{font-size:30px;border:0;background:#f3f4f6;border-radius:16px;padding:8px 11px;min-width:54px}
.daybar{display:flex;align-items:center;justify-content:space-between;background:#fff;margin:10px;padding:12px;border-radius:14px}.arrow{border:1px solid #d1d5db;background:#f3f4f6;color:#374151;font-size:24px;font-weight:900;padding:6px 14px;border-radius:999px;min-width:48px}.day{font-size:22px;font-weight:700}
.imgs{display:flex;gap:8px;overflow-x:auto;margin-top:10px}.imgs img{height:130px;max-width:92%;border-radius:12px;object-fit:cover;background:#0f172a}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

.daychecks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.daychecks label{background:#f3f4f6;border:1px solid #d1d5db;border-radius:14px;padding:10px 11px;display:flex;align-items:center;gap:9px;color:#374151;font-weight:800}
.daychecks input{width:auto;margin:0;position:absolute;opacity:0;pointer-events:none}
.dayTick{width:22px;height:22px;border-radius:8px;border:2px solid #9ca3af;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:1000;line-height:1;background:#fff;color:transparent;flex:0 0 auto}
.daychecks input:checked+.dayTick{background:#2563eb;border-color:#2563eb;color:#fff}
.daychecks label:has(input:checked){background:#dbeafe;border-color:#60a5fa;color:#1e40af}
.dayText{line-height:1}
.progress{height:16px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin-top:6px}.fill{height:100%;background:var(--green);width:0%}
.overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:flex-end;z-index:30}.sheet{background:#fff;width:100%;border-radius:22px 22px 0 0;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}
.logDate{font-size:18px;font-weight:800;margin:18px 0 8px}.logEntry{background:#fff;border-radius:14px;padding:12px;margin:8px 0;box-shadow:0 1px 4px #0001}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}.calcell{min-height:42px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700}.done{background:var(--green)!important;color:white}.holiday{background:var(--blue)!important;color:white;font-size:13px}
.timer,.complete{position:fixed;inset:0;background:var(--dark);color:white;z-index:20;display:flex;flex-direction:column;padding:calc(14px + env(safe-area-inset-top)) 14px calc(10px + env(safe-area-inset-bottom));overflow:auto}.timer h1,.complete h1{text-align:center;font-size:26px;margin:0 0 8px}.complete h1{font-size:28px}
.timerImg{display:flex;justify-content:center;overflow-x:auto;gap:10px;margin:8px 0}.timerImg img{width:min(82vw,330px);height:210px;object-fit:contain;background:#0f172a;border-radius:16px}
.round{text-align:center;color:#d1d5db;font-size:17px;min-height:28px}.count{text-align:center;font-size:42px;font-weight:800;margin:8px 0}.timerNote{text-align:center;color:#e5e7eb;font-size:15px;margin:4px 0 8px;white-space:pre-wrap}.timer .progress{background:#374151}.timer .fill{background:white}.timerBtns{display:grid;gap:8px;margin-top:auto}

.waterTop{display:flex;justify-content:space-between;align-items:center;gap:10px}

.waterStatusRed{color:#dc2626}.waterStatusOrange{color:#f97316}.waterStatusGreen{color:#16a34a}
.waterFillRed{background:#dc2626}.waterFillOrange{background:#f97316}.waterFillGreen{background:#16a34a}.waterBtns .btn{padding:10px 7px;font-size:13px;border-radius:12px}
.cog{border:0;background:transparent;color:#6b7280;width:28px;height:28px;font-size:16px;padding:0;line-height:1;border-radius:999px}


.summaryHeader{cursor:pointer;user-select:none}.summaryChevron{font-size:14px;color:var(--muted);margin-left:6px}.themePick{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}

function dayStart(d){let x=new Date(d);x.setHours(0,0,0,0);return x}

function sumWater(start,end){let total=0,d=dayStart(start),last=dayStart(end);while(d<=last){total+=+((st.waterDaily||{})[dateKey(d)]||0);d=addDays(d,1)}return total}
function mlCompare(diff,label){if(diff>0)return `<span class="summaryGood">${diff}ml more</span> than ${label}`;if(diff<0)return `<span class="summaryWarn">${Math.abs(diff)}ml less</span> than ${label}`;return `<span class="summaryNeutral">same as</span> ${label}`}
function moodCounts(start,end){let c={sad:0,neutral:0,happy:0,total:0};(st.moods||[]).forEach(m=>{let d=new Date(m.date);if(d>=start&&d<=end){c.total++;if(c[m.type]!==undefined)c[m.type]++}});return c}
function moodText(c){return `😊 ${c.happy} happy, 😐 ${c.neutral} neutral, 😞 ${c.sad} sad`}
function plannedExercisesOnDate(d){let day=days[d.getDay()];return (st.tabs||[]).reduce((n,t)=>n+(((t.days||{})[day]||[]).length),0)}
function plannedRoutineDays(start,end){let n=0,d=dayStart(start),last=dayStart(end);while(d<=last){if(plannedExercisesOnDate(d)>0)n++;d=addDays(d,1)}return n}
function plannedExerciseTabsOnDate(d){let day=days[d.getDay()];return (st.tabs||[]).filter(t=>(((t.days||{})[day]||[]).length)>0)}
function exerciseTabDoneOn(t,d){let k=dateKey(d),a=((st.exerciseChecks||{})[k]||[]);if(a.includes(t.id))return true;if((!st.exerciseChecks||!st.exerciseChecks[k]||!st.exerciseChecks[k].length)&&isDone(k))return true;return false}
function markExerciseTabToday(){endHoliday();let k=todayKey();st.exerciseChecks=st.exerciseChecks||{};let a=st.exerciseChecks[k]||[];let id=tab().id;if(id&&!a.includes(id))a.push(id);st.exerciseChecks[k]=a;if(!st.completedDates.includes(k))st.completedDates.push(k);save()}

function exerciseLogKeys(){let set=new Set(),now=new Date();for(let i=0;i<14;i++){let d=addDays(now,-i);if(plannedExerciseTabsOnDate(d).length)set.add(dateKey(d))}Object.keys(st.exerciseChecks||{}).forEach(k=>set.add(k));return [...set].sort((a,b)=>new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))}

function habitDoneTotal(type,key){let ids=habitsByType(type).filter(h=>habitExistedInPeriod(h,key)).map(h=>h.id),done=((st.habitChecks||{})[key]||[]);return ids.filter(id=>done.includes(id)).length}
function habitRangeStats(type,start,end){let total=0,done=0;if(type==='daily'){let d=dayStart(start),last=dayStart(end);while(d<=last){let k=habitPeriodKey('daily',d),count=habitsByType('daily').filter(h=>habitExistedInPeriod(h,k)).length;total+=count;done+=habitDoneTotal('daily',k);d=addDays(d,1)}}else if(type==='weekly'){let seen=new Set(),d=dayStart(start),last=dayStart(end);while(d<=last){seen.add(habitPeriodKey('weekly',d));d=addDays(d,1)}seen.forEach(k=>{total+=habitsByType('weekly').filter(h=>habitExistedInPeriod(h,k)).length;done+=habitDoneTotal('weekly',k)})}else{let seen=new Set(),d=dayStart(start),last=dayStart(end);while(d<=last){seen.add(habitPeriodKey('monthly',d));d=addDays(d,1)}seen.forEach(k=>{total+=habitsByType('monthly').filter(h=>habitExistedInPeriod(h,k)).length;done+=habitDoneTotal('monthly',k)})}return {done,total}}

function exerciseItemsLeftToday(){return exerciseItemsLeftOn(new Date())}

function dailyEverythingStreak(){let d=dayStart(new Date()),n=0;if(!dailyCompleteOn(d))d=addDays(d,-1);while(dailyCompleteOn(d)){n++;d=addDays(d,-1)}return n}
function dailyStreakTitle(){return 'Daily streak'}

function openDailyStreakGoal(){modal(`<div class="overlay"><div class="sheet"><div class="title">Daily streak goal</div><div class="meta">Choose the target number of straight days.</div><input id="dailyStreakGoalInput" type="number" value="${dailyStreakGoal()}" placeholder="Goal days"><div style="display:flex;gap:8px;margin-top:8px"><button class="btn green" onclick="saveDailyStreakGoal()">Save</button><button class="btn" onclick="modal('')">Cancel</button></div></div></div>`);setTimeout(()=>document.getElementById('dailyStreakGoalInput')?.focus(),100)}
function saveDailyStreakGoal(){let v=Math.max(1,Math.round(+document.getElementById('dailyStreakGoalInput').value||100));st.dailyStreakGoal=v;save();modal('');render()}

function mixHex(a,b,p){let ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16),ar=ah>>16,ag=ah>>8&255,ab=ah&255,br=bh>>16,bg=bh>>8&255,bb=bh&255;let rr=Math.round(ar+(br-ar)*p),rg=Math.round(ag+(bg-ag)*p),rb=Math.round(ab+(bb-ab)*p);return `rgb(${rr},${rg},${rb})`}

function weekEnd(d=new Date()){return dayEnd(addDays(weekStart(d),6))}
function monthStart(d=new Date()){let x=new Date(d);return new Date(x.getFullYear(),x.getMonth(),1)}
function monthEnd(d=new Date()){let x=new Date(d);return dayEnd(new Date(x.getFullYear(),x.getMonth()+1,0))}
function shortDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function weekHabitProgress(){let now=new Date(),wk=habitPeriodKey('weekly',now),weeklyTotal=habitsByType('weekly').filter(h=>habitExistedInPeriod(h,wk)).length,weeklyDone=habitDoneTotal('weekly',wk);return {done:weeklyDone,total:weeklyTotal,start:weekStart(now),end:weekEnd(now)}}
function monthHabitProgress(){let now=new Date(),mk=habitPeriodKey('monthly',now),monthlyTotal=habitsByType('monthly').filter(h=>habitExistedInPeriod(h,mk)).length,monthlyDone=habitDoneTotal('monthly',mk);return {done:monthlyDone,total:monthlyTotal,start:monthStart(now),end:monthEnd(now)}}

function monthHabitsDoneOn(d){let k=habitPeriodKey('monthly',d),total=habitsByType('monthly').filter(h=>habitExistedInPeriod(h,k)).length,done=habitDoneTotal('monthly',k);return total===0||done>=total}

function fiveOutOfFiveStreak(){let d=dayStart(new Date()),n=0;if(!fiveOutOfFiveDoneOn(d))d=addDays(d,-1);while(fiveOutOfFiveDoneOn(d)){n++;d=addDays(d,-1)}return n}

function firstName(){let n=(st.userName||'').trim();return n?n.split(/\s+/)[0]:'there'}

function compareAmount(diff,unit){if(diff>0)return `<span class="summaryGood">${diff}${unit} more</span>`;if(diff<0)return `<span class="summaryWarn">${Math.abs(diff)}${unit} less</span>`;return `<span class="summaryNeutral">same</span>`}
function comparisonPeriod(){let now=new Date();if(now.getDate()===1){let s=new Date(now.getFullYear(),now.getMonth()-1,1),e=dayEnd(new Date(now.getFullYear(),now.getMonth(),0)),ps=new Date(now.getFullYear(),now.getMonth()-2,1),pe=dayEnd(new Date(now.getFullYear(),now.getMonth()-1,0));return {label:'Last month vs month before',s,e,ps,pe}}let ws=weekStart(now),s=addDays(ws,-7),e=dayEnd(addDays(ws,-1)),ps=addDays(ws,-14),pe=dayEnd(addDays(ws,-8));return {label:'Last week vs week before',s,e,ps,pe}}
function welcomeComparisonHtml(){let p=comparisonPeriod(),water=sumWater(p.s,p.e),prevWater=sumWater(p.ps,p.pe),exercise=exerciseDoneTabsCount(p.s,p.e),prevExercise=exerciseDoneTabsCount(p.ps,p.pe),happy=moodCounts(p.s,p.e).happy,prevHappy=moodCounts(p.ps,p.pe).happy;return `<div class="welcomeNext"><b>${p.label}</b><div class="welcomeCompareLine">Water: ${compareAmount(water-prevWater,'ml')}</div><div class="welcomeCompareLine">Exercise: ${compareAmount(exercise-prevExercise,'')} tabs</div><div class="welcomeCompareLine">Happy faces: ${compareAmount(happy-prevHappy,'')}</div></div>`}

function openExerciseTabFromHome(id){let i=(st.tabs||[]).findIndex(t=>t.id===id);if(i>=0)active=i;currentScreen='routine';render()}

function welcomePeriodGoalsHtml(type,label){
 let now=new Date(),key=habitPeriodKey(type,now),goals=habitsByType(type).filter(h=>habitExistedInPeriod(h,key));
 if(!goals.length)return '';
 let done=goals.filter(h=>habitIsDone(h,key)).length;
 return `<div class="welcomeGoalBlock"><div class="welcomeGoalTitle">${label}<span>${done}/${goals.length}</span></div><div class="welcomeHabitList">${goals.map(h=>`<label class="welcomeHabitChip ${habitIsDone(h,key)?'goalDone':''}"><input type="checkbox" ${habitIsDone(h,key)?'checked':''} onchange="toggleHabit('${h.id}','${type}')"><span>${esc(h.name)}</span></label>`).join('')}</div></div>`;
}
function welcomeLeftTodayHtml(){
 let now=new Date(),items=[],hk=habitPeriodKey('daily',now),habits=habitsByType('daily').filter(h=>habitExistedInPeriod(h,hk)&&!habitIsDone(h,hk));
 habits.forEach(h=>items.push(`<label class="welcomeHabitChip"><input type="checkbox" onchange="toggleHabit('${h.id}','daily')"><span>${esc(h.name)}</span></label>`));
 let waterLeft=Math.max(0,waterGoal()-waterToday());
 if(waterLeft>0)items.push(`<span class="welcomeItemChip">💧 ${waterLeft}ml water left</span>`);
 let exTabs=plannedExerciseTabsOnDate(now).filter(t=>!exerciseTabDoneOn(t,now));
 exTabs.forEach(t=>{let count=(((t.days||{})[days[now.getDay()]]||[]).length);items.push(`<span class="welcomeItemChip welcomeExerciseChip" onclick="openExerciseTabFromHome('${t.id}')">${esc(t.name)}${count?' · '+count:''}</span>`)});
 let todayHtml=items.length?`<div class="welcomeHabitText">Here’s what you have left today:</div><div class="welcomeHabitList">${items.join('')}</div>`:`<div class="welcomeDoneText">Everything is done for today.</div>`;
 return todayHtml+welcomePeriodGoalsHtml('weekly','This week')+welcomePeriodGoalsHtml('monthly','This month');
}

function welcomeHtml(){return `<div class="card welcomeCard"><div class="welcomeTop"><div><div class="welcomeHi">Hi ${esc(firstName())}! 😊</div>${welcomeLeftTodayHtml()}</div></div></div>`}
function home(){let wd=weekDone(),sk=streak(),wat=waterToday(),goal=waterGoal(),pct=Math.min(100,Math.round(wat/goal*100)),cls=waterClass(wat),fill=waterFillClass(wat);root(topHtml()+`<div class="content">${welcomeHtml()}${dailyStreakHtml()}<div class="card moodCard"><div class="title">How are you feeling?</div><div class="moodRow"><div class="moodFaces"><button class="moodBtn" onclick="openMood('sad','😞')">😞</button><button class="moodBtn" onclick="openMood('neutral','😐')">😐</button><button class="moodBtn" onclick="openMood('happy','😊')">😊</button></div><div class="moodIconBtns"><button class="moodMiniBtn" onclick="currentScreen='moodlog';render()" aria-label="Mood log">☰</button><button class="moodMiniBtn" onclick="currentScreen='moodcalendar';render()" aria-label="Mood calendar">▦</button></div></div></div><div class="card"><div class="waterTop"><div class="name">Water today</div><button class="cog" onclick="openWaterSettings()" aria-label="Water settings">⚙︎</button></div><div class="waterAmount ${cls}" onclick="openSetWater()">${wat}ml</div><div class="waterGoal">Goal: ${goal}ml</div><div class="progress"><div class="fill ${fill}" style="width:${pct}%"></div></div><div class="waterBtns"><button class="waterBtn" onclick="addWater(st.waterBtn1)">+${st.waterBtn1}ml</button><button class="waterBtn" onclick="addWater(st.waterBtn2)">+${st.waterBtn2}ml</button><button class="waterBtn waterBtnLog" onclick="currentScreen='waterlog';render()">Water log</button></div></div>${yesterdayEditHtml()}</div>`)}
function openMood(type,emoji){modal(`<div class="overlay"><div class="sheet"><div class="title">${emoji} Why?</div><textarea id="moodReason" placeholder="Write your reason..."></textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn green" onclick="saveMood('${type}','${emoji}')">Save</button><button class="btn" onclick="modal('')">Cancel</button></div></div></div>`)}
function saveMood(type,emoji){let reason=document.getElementById('moodReason').value.trim();st.moods.unshift({type,emoji,reason,date:new Date().toISOString()});save();modal('');home()}

function applyTheme(){if(st&&st.theme==='porto')st.theme='relaxar';document.body.classList.remove('theme-dark','theme-clockit','theme-relaxar');if(st&&st.theme==='dark')document.body.classList.add('theme-dark');if(st&&st.theme==='clockit')document.body.classList.add('theme-clockit');if(st&&st.theme==='relaxar')document.body.classList.add('theme-relaxar')}
function themeName(){return st.theme==='dark'?'Dark mode':st.theme==='clockit'?'Clock It mode':st.theme==='relaxar'?'Relaxar':'Light mode'}

function openTheme(){modal(`<div class="overlay"><div class="sheet"><div class="title">Choose theme</div><div class="meta">Current: ${themeName()}</div><div class="themePick"><button class="btn" onclick="setThemeMode('light')">☀️ Light mode</button><button class="btn dark" onclick="setThemeMode('dark')">🌙 Dark mode</button><button class="btn green" onclick="setThemeMode('clockit')">✨ Clock It mode</button><button class="btn blue" onclick="setThemeMode('relaxar')">🌙 Relaxar</button></div><button class="btn" style="margin-top:10px" onclick="modal('')">Cancel</button></div></div>`)}

function waterGoal(){return Math.max(1,+st.waterGoal||2000)}
function waterToday(){return +st.waterDaily[todayKey()]||0}
function setWater(v){st.waterDaily[todayKey()]=Math.max(0,Math.round(+v||0));save();render()}
function addWater(v){setWater(waterToday()+(+v||0))}
function waterClass(v){let g=waterGoal();return v>=g?'waterStatusGreen':v>=g/2?'waterStatusOrange':'waterStatusRed'}
function waterFillClass(v){let g=waterGoal();return v>=g?'waterFillGreen':v>=g/2?'waterFillOrange':'waterFillRed'}
function openSetWater(){modal(`<div class="overlay"><div class="sheet"><div class="title">Set today's water</div><input id="waterManual" type="number" value="${waterToday()}" placeholder="ml"><div style="display:flex;gap:8px;margin-top:8px"><button class="btn green" onclick="saveManualWater()">Save</button><button class="btn" onclick="modal('')">Cancel</button></div></div></div>`);setTimeout(()=>document.getElementById('waterManual')?.focus(),100)}
function saveManualWater(){let v=document.getElementById('waterManual').value;modal('');setWater(v)}
function openWaterSettings(){modal(`<div class="overlay"><div class="sheet"><div class="title">Water settings</div><input id="waterGoalInput" type="number" value="${waterGoal()}" placeholder="Daily goal ml"><input id="waterBtn1Input" type="number" value="${st.waterBtn1||100}" placeholder="Button 1 ml"><input id="waterBtn2Input" type="number" value="${st.waterBtn2||500}" placeholder="Button 2 ml"><div style="display:flex;gap:8px;margin-top:8px"><button class="btn green" onclick="saveWaterSettings()">Save</button><button class="btn" onclick="modal('')">Cancel</button></div></div></div>`)}
function saveWaterSettings(){st.waterGoal=Math.max(1,Math.round(+document.getElementById('waterGoalInput').value||2000));st.waterBtn1=Math.max(1,Math.round(+document.getElementById('waterBtn1Input').value||100));st.waterBtn2=Math.max(1,Math.round(+document.getElementById('waterBtn2Input').value||500));save();modal('');render()}
function waterLog(){let keys=Object.keys(st.waterDaily||{}).sort().reverse();root(topHtml()+`<div class="content"><div class="title">Water log</div>${keys.length?keys.map(k=>{let d=new Date(k+'T00:00:00'),v=+st.waterDaily[k]||0,cls=waterClass(v),fill=waterFillClass(v),pct=Math.min(100,Math.round(v/waterGoal()*100));return `<div class="logDate">${longDate(d)}</div><div class="logEntry"><div class="name ${cls}">${v}ml</div><div class="meta">Goal: ${waterGoal()}ml</div><div class="progress"><div class="fill ${fill}" style="width:${pct}%"></div></div></div>`}).join(''):`<div class="card">No water logged yet.</div>`}</div><div class="bottom"><button class="btn dark" onclick="currentScreen='home';render()">Back</button></div>`)}

function moodLog(){let groups={};st.moods.forEach(m=>{let d=new Date(m.date),k=longDate(d);groups[k]=groups[k]||[];groups[k].push(m)});root(topHtml()+`<div class="content"><div class="title">Mood log</div>${st.moods.length?Object.keys(groups).map(d=>`<div class="logDate">${d}</div>${groups[d].map(m=>`<div class="logEntry"><b>${timeOnly(new Date(m.date))}</b> <span style="font-size:24px">${m.emoji}</span><div class="notes">${esc(m.reason||'No reason added')}</div></div>`).join('')}`).join(''):`<div class="card">No mood logs yet.</div>`}</div><div class="bottom"><button class="btn dark" onclick="currentScreen='home';render()">Back</button></div>`)}

function moodDayStats(key){let c={happy:0,neutral:0,sad:0,total:0};(st.moods||[]).forEach(m=>{if(dateKey(new Date(m.date))===key){c.total++;if(m.type==='happy')c.happy++;else if(m.type==='sad')c.sad++;else c.neutral++}});return c}
function moodWinner(c){if(!c.total)return'';if(c.happy>c.sad&&c.happy>c.neutral)return'positive';if(c.sad>c.happy&&c.sad>c.neutral)return'negative';return'neutral'}
function moodCalendar(){let y=calDate.getFullYear(),m=calDate.getMonth(),first=new Date(y,m,1),max=new Date(y,m+1,0).getDate(),start=first.getDay(),cells='';for(let i=0;i<start;i++)cells+='<div></div>';for(let d=1;d<=max;d++){let k=dateKey(new Date(y,m,d)),c=moodDayStats(k),w=moodWinner(c),cls=w==='positive'?'moodPos':w==='negative'?'moodNeg':w==='neutral'?'moodNeu':'';cells+=`<div class="moodCalCell">${w?`<div class="moodDot ${cls}" title="${c.total} mood entries">${d}</div>`:d}</div>`}root(topHtml()+`<div class="content"><div class="card"><div style="display:flex;align-items:center;gap:8px"><button class="mini" onclick="calDate=new Date(${y},${m-1},1);render()">‹</button><div class="name" style="flex:1;text-align:center">${calDate.toLocaleString('default',{month:'long',year:'numeric'})}</div><button class="mini" onclick="calDate=new Date(${y},${m+1},1);render()">›</button></div><div class="moodCalGrid">${['S','M','T','W','T','F','S'].map(d=>`<div class="small" style="text-align:center;font-weight:700">${d}</div>`).join('')}${cells}</div><div class="moodLegend"><div class="moodLegendItem"><span class="moodLegendDot moodPos"></span> More happy</div><div class="moodLegendItem"><span class="moodLegendDot moodNeg"></span> More sad</div><div class="moodLegendItem"><span class="moodLegendDot moodNeu"></span> Neutral / tied</div></div></div></div><div class="bottom"><button class="btn dark" onclick="currentScreen='home';render()">Back</button><button class="btn" onclick="currentScreen='moodlog';render()">Mood log</button></div>`)}

function habitsByType(type){return (st.habits||[]).filter(h=>h.type===type)}
function habitPeriodKey(type,d=new Date()){if(type==='daily')return 'D:'+dateKey(d);if(type==='weekly')return 'W:'+dateKey(weekStart(d));return 'M:'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function habitPeriodDate(key){let raw=key.slice(2);if(key[0]==='M')return new Date(raw+'-01T00:00:00');return new Date(raw+'T00:00:00')}
function habitPeriodEndDate(key){let start=habitPeriodDate(key);if(key[0]==='D')return dayEnd(start);if(key[0]==='W')return dayEnd(addDays(start,6));return dayEnd(new Date(start.getFullYear(),start.getMonth()+1,0))}
function habitPrefix(type){return type==='daily'?'D':type==='weekly'?'W':'M'}
function habitCreatedDate(h){return new Date((h.createdAt||todayKey())+'T00:00:00')}
function habitExistedInPeriod(h,key){return habitCreatedDate(h)<=habitPeriodEndDate(key)}
function migrateHabitsCreatedAt(){let changed=false;(st.habits||[]).forEach(h=>{if(!h.createdAt){let prefix=habitPrefix(h.type),earliest=null;Object.keys(st.habitChecks||{}).forEach(k=>{if(k[0]===prefix&&((st.habitChecks||{})[k]||[]).includes(h.id)){let d=habitPeriodDate(k);if(!earliest||d<earliest)earliest=d}});h.createdAt=dateKey(earliest||new Date());changed=true}});if(changed)save()}
function habitIsDone(h,key=habitPeriodKey(h.type)){return ((st.habitChecks||{})[key]||[]).includes(h.id)}
function toggleHabit(id,type){let key=habitPeriodKey(type);st.habitChecks=st.habitChecks||{};let a=st.habitChecks[key]||[];if(a.includes(id))a=a.filter(x=>x!==id);else a.push(id);st.habitChecks[key]=a;save();render()}
function habitSectionHtml(type,label){let hs=habitsByType(type);return `<div class="habitSection"><div class="habitSectionTitle">${label}</div>${hs.length?hs.map(h=>`<label class="habitItem ${habitIsDone(h)?'checked':''}"><input type="checkbox" ${habitIsDone(h)?'checked':''} onchange="toggleHabit('${h.id}','${h.type}')"><span>${esc(h.name)}</span></label>`).join(''):`<div class="small">No ${label.toLowerCase()} habits yet.</div>`}</div>`}
function habitHomeHtml(){return `<div class="card"><div class="habitTop"><div class="name">My habits</div><button class="cog habitLogIcon" onclick="openHabitLog('daily')" aria-label="Habits log">📋</button></div>${habitSectionHtml('daily','Daily')}${habitSectionHtml('weekly','Weekly')}${habitSectionHtml('monthly','Monthly')}<div class="habitActions"><button class="btn dark" onclick="openHabitsSettings()">Manage habits</button></div></div>`}
function openHabitsSettings(type){habitSettingsType=type||habitSettingsType||'daily';modal(`<div class="overlay"><div class="sheet"><div class="title">Habit settings</div><input id="habitName" placeholder="Habit name"><select id="habitType" onchange="habitSettingsType=this.value"><option value="daily" ${habitSettingsType==='daily'?'selected':''}>Daily habit</option><option value="weekly" ${habitSettingsType==='weekly'?'selected':''}>Weekly habit</option><option value="monthly" ${habitSettingsType==='monthly'?'selected':''}>Monthly habit</option></select><button class="btn green" onclick="addHabit()">Add habit</button><div class="logDate">Current habits</div>${st.habits.length?st.habits.map(h=>`<div class="habitManage"><span>${esc(h.name)} <span class="small">(${h.type})</span></span><button class="mini red" onclick="deleteHabit('${h.id}')">Delete</button></div>`).join(''):`<div class="card">No habits yet.</div>`}<button class="btn" style="margin-top:10px" onclick="modal('')">Close</button></div></div>`);setTimeout(()=>document.getElementById('habitName')?.focus(),100)}
function addHabit(){let name=document.getElementById('habitName').value.trim(),type=document.getElementById('habitType').value;habitSettingsType=type;if(!name){alert('Enter a habit name');return}st.habits.push({id:uid(),name,type,createdAt:todayKey()});save();render();openHabitsSettings(type)}
function deleteHabit(id){if(!confirm('Delete this habit?'))return;let type=document.getElementById('habitType')?.value||habitSettingsType||'daily';habitSettingsType=type;st.habits=(st.habits||[]).filter(h=>h.id!==id);Object.keys(st.habitChecks||{}).forEach(k=>st.habitChecks[k]=(st.habitChecks[k]||[]).filter(x=>x!==id));save();render();openHabitsSettings(type)}
function habitRecentKeys(type){let set=new Set(),now=new Date(),hs=habitsByType(type);if(!hs.length)return [];function maybeAdd(k){if(hs.some(h=>habitExistedInPeriod(h,k)))set.add(k)}if(type==='daily'){for(let i=0;i<14;i++)maybeAdd(habitPeriodKey(type,addDays(now,-i)))}else if(type==='weekly'){let s=weekStart(now);for(let i=0;i<10;i++)maybeAdd(habitPeriodKey(type,addDays(s,-7*i)))}else{let y=now.getFullYear(),m=now.getMonth();for(let i=0;i<12;i++)maybeAdd(habitPeriodKey(type,new Date(y,m-i,1)))}Object.keys(st.habitChecks||{}).forEach(k=>{if((type==='daily'&&k[0]==='D')||(type==='weekly'&&k[0]==='W')||(type==='monthly'&&k[0]==='M'))maybeAdd(k)});return [...set].sort((a,b)=>habitPeriodDate(b)-habitPeriodDate(a))}
function habitPeriodTitle(type,key){let d=habitPeriodDate(key);if(type==='daily')return longDate(d);if(type==='weekly')return 'Week '+shortDate(d)+' - '+shortDate(addDays(d,6));return d.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}

function migrateJournalItems(){let changed=false;(st.journalItems||[]).forEach(j=>{if(!j.id){j.id=uid();changed=true}if(!j.createdAt){j.createdAt=todayKey();changed=true}});if(changed)save()}
function journalTodayKey(){return dateKey(new Date())}
function journalItemsForDate(d){let end=dayEnd(d);return (st.journalItems||[]).filter(j=>!j.deletedAt&&new Date((j.createdAt||todayKey())+'T00:00:00')<=end)}
function journalDoneIds(k=journalTodayKey()){st.journalChecks=st.journalChecks||{};return st.journalChecks[k]||[]}
function journalItemDoneOn(id,d){return journalDoneIds(dateKey(d)).includes(id)}
function toggleJournalItem(id){let k=journalTodayKey(),a=journalDoneIds(k);if(a.includes(id))a=a.filter(x=>x!==id);else a.push(id);st.journalChecks[k]=a;save();render()}
function openAddJournalItem(){modal(`<div class="overlay"><div class="sheet"><div class="title">Add journal item</div><input id="journalItemName" placeholder="Vitamin D"><div style="display:flex;gap:8px;margin-top:8px"><button class="btn green" onclick="saveJournalItem()">Save</button><button class="btn" onclick="modal('')">Cancel</button></div></div></div>`);setTimeout(()=>document.getElementById('journalItemName')?.focus(),100)}
function saveJournalItem(){let name=document.getElementById('journalItemName').value.trim();if(!name)return;st.journalItems=st.journalItems||[];st.journalItems.push({id:uid(),name,createdAt:todayKey()});save();modal('');render()}
function removeJournalItem(id){let j=(st.journalItems||[]).find(x=>x.id===id);if(!j)return;if(!confirm('Remove this journal item?'))return;j.deletedAt=todayKey();save();render()}
function journalPage(){let items=journalItemsForDate(new Date()),done=journalDoneIds();root(topHtml()+`<div class="content"><div class="card"><div class="journalTop"><div><div class="title">Journal</div><div class="meta">Daily checklist</div></div></div>${items.length?items.map(j=>`<label class="journalItem ${done.includes(j.id)?'checked':''}"><input type="checkbox" ${done.includes(j.id)?'checked':''} onchange="toggleJournalItem('${j.id}')"><span>${esc(j.name)}</span><button type="button" class="journalRemove" onclick="event.preventDefault();event.stopPropagation();removeJournalItem('${j.id}')">Remove</button></label>`).join(''):`<div class="small">No journal items yet.</div>`}<div class="journalActions"><button class="btn green" onclick="openAddJournalItem()">Add item</button><button class="btn dark" onclick="currentScreen='journallog';render()">Journal log</button></div></div></div>`)}
function journalLogKeys(){let set=new Set(),now=new Date();for(let i=0;i<30;i++)set.add(dateKey(addDays(now,-i)));Object.keys(st.journalChecks||{}).forEach(k=>set.add(k));return [...set].sort((a,b)=>new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))}
function journalLog(){let keys=journalLogKeys();root(topHtml()+`<div class="content"><div class="title">Journal log</div>${keys.map(k=>{let d=new Date(k+'T00:00:00'),items=journalItemsForDate(d),done=journalDoneIds(k);return `<div class="logDate">${longDate(d)}</div><div class="logEntry">${items.length?items.map(j=>`<div class="journalLogLine ${done.includes(j.id)?'journalLogDone':'journalLogMiss'}" onclick="openJournalCalendar('${j.id}')"><span>${done.includes(j.id)?'✓':'✕'} ${esc(j.name)}</span><span>▦</span></div>`).join(''):`<div class="small">No journal items existed this day.</div>`}</div>`}).join('')}</div><div class="bottom"><button class="btn dark" onclick="currentScreen='journal';render()">Back</button></div>`)}
function openJournalCalendar(id){journalCalItemId=id;journalCalDate=new Date();currentScreen='journalcalendar';render()}
function journalCalendar(){let item=(st.journalItems||[]).find(j=>j.id===journalCalItemId);if(!item){currentScreen='journallog';return render()}let y=journalCalDate.getFullYear(),m=journalCalDate.getMonth(),first=new Date(y,m,1),start=first.getDay(),daysIn=new Date(y,m+1,0).getDate(),today=dayStart(new Date()),created=dayStart(new Date((item.createdAt||todayKey())+'T00:00:00')),monthTitle=journalCalDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});let cells='';for(let i=0;i<start;i++)cells+=`<div></div>`;for(let day=1;day<=daysIn;day++){let d=new Date(y,m,day),future=d>today,before=d<created,cls=future||before?'journalCalFuture':journalItemDoneOn(item.id,d)?'journalCalDone':'journalCalMiss';cells+=`<div class="journalCalCell ${cls}">${day}</div>`}root(topHtml()+`<div class="content"><div class="title">${esc(item.name)}</div><div class="meta">Green = checked · Red = not checked</div><div class="card"><div class="journalCalHead"><button class="arrow" onclick="journalCalDate=new Date(${y},${m-1},1);render()">‹</button><div class="name">${monthTitle}</div><button class="arrow" onclick="journalCalDate=new Date(${y},${m+1},1);render()">›</button></div><div class="journalWeekdays">${days.map(d=>`<div>${d.slice(0,3)}</div>`).join('')}</div><div class="journalCalGrid">${cells}</div></div></div><div class="bottom"><button class="btn dark" onclick="currentScreen='journallog';render()">Back</button></div>`)}

function trendDates(n=14){let a=[];let today=dayStart(new Date());for(let i=n-1;i>=0;i--)a.push(addDays(today,-i));return a}
function trendLabel(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function clampPercent(v){if(v===null||v===undefined||isNaN(v))return null;return Math.max(0,Math.min(100,Math.round(v)))}
function moodPositivityOn(d){let c=moodCounts(dayStart(d),dayEnd(d)),den=c.happy+c.sad;if(!den)return null;return c.happy/den*100}
function exerciseCompletionOn(d){let tabs=plannedExerciseTabsOnDate(d);if(!tabs.length)return null;let done=tabs.filter(t=>exerciseTabDoneOn(t,d)).length;return done/tabs.length*100}
function habitCompletionOn(d){let key=habitPeriodKey('daily',d),total=habitsByType('daily').filter(h=>habitExistedInPeriod(h,key)).length;if(!total)return null;return habitDoneTotal('daily',key)/total*100}

function trendSvg(title,values,sub){let labels=trendDates(values.length).map(trendLabel),w=320,h=118,pad=14,plotW=w-pad*2,plotH=82,top=12;let pts=values.map((v,i)=>v===null?null:{x:pad+(plotW*(i/(values.length-1))),y:top+plotH-(clampPercent(v)/100*plotH),v:clampPercent(v)});let d='',started=false;pts.forEach(p=>{if(!p){started=false;return}d+=(started?' L ':'M ')+p.x.toFixed(1)+' '+p.y.toFixed(1);started=true});let area='';let first=pts.find(p=>p),last=[...pts].reverse().find(p=>p);if(first&&last)area=`${d} L ${last.x.toFixed(1)} ${top+plotH} L ${first.x.toFixed(1)} ${top+plotH} Z`;let dots=pts.filter(p=>p).map(p=>`<circle class="trendDot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3"></circle>`).join('');let clean=values.filter(v=>v!==null),latest=clean.length?Math.round(clean[clean.length-1])+'%':'—';return `<div class="card trendCard"><div class="trendTop"><div><div class="trendTitle">${title}</div><div class="small">${sub}</div></div><div class="trendValue">${latest} ${trendChange(values)}</div></div>${clean.length?`<svg class="trendSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><line class="trendGridLine" x1="${pad}" y1="${top}" x2="${w-pad}" y2="${top}"></line><line class="trendGridLine" x1="${pad}" y1="${top+plotH/2}" x2="${w-pad}" y2="${top+plotH/2}"></line><line class="trendAxis" x1="${pad}" y1="${top+plotH}" x2="${w-pad}" y2="${top+plotH}"></line><path class="trendArea" d="${area}"></path><path class="trendLine" d="${d}"></path>${dots}</svg><div class="trendFooter"><span>${labels[0]}</span><span>${labels[labels.length-1]}</span></div>`:`<div class="noTrendData">Not enough data yet.</div>`}</div>`}

function calendar(){let y=calDate.getFullYear(),m=calDate.getMonth(),first=new Date(y,m,1),max=new Date(y,m+1,0).getDate(),start=first.getDay(),cells='';for(let i=0;i<start;i++)cells+='<div></div>';for(let d=1;d<=max;d++){let k=dateKey(new Date(y,m,d));cells+=`<div class="calcell ${isDone(k)?'done':isHoliday(k)?'holiday':''}">${isHoliday(k)&&!isDone(k)?d+' H':d}</div>`}root(topHtml()+`<div class="content"><div class="card"><div style="display:flex;align-items:center;gap:8px"><button class="mini" onclick="calDate=new Date(${y},${m-1},1);render()">‹</button><div class="name" style="flex:1;text-align:center">${calDate.toLocaleString('default',{month:'long',year:'numeric'})}</div><button class="mini" onclick="calDate=new Date(${y},${m+1},1);render()">›</button></div><div class="calgrid">${['S','M','T','W','T','F','S'].map(d=>`<div class="small" style="text-align:center;font-weight:700">${d}</div>`).join('')}${cells}</div></div><div class="card"><div class="name">Current streak: ${streak()} day${streak()===1?'':'s'}</div><div class="meta">Green = complete. Blue H = holiday/pause day.</div><div class="meta">${st.holidayMode?'Holiday mode is ON':'Holiday mode is OFF'}</div></div></div><div class="bottom"><button class="btn dark" onclick="currentScreen='routine';render()">Back</button><button class="btn ${st.holidayMode?'blue':''}" onclick="toggleHoliday()">${st.holidayMode?'End holiday':'Holiday mode'}</button></div>`)}

function timerRound(e){if(e.secs&&e.reps>1)return`Round ${currentRound} / ${e.reps}`;if(!e.secs&&e.reps)return'Reps';return''}function timerCount(e){if(e.secs)return`${elapsed} sec / ${e.secs} secs`;if(e.reps)return`${currentRep} / ${e.reps}`;return'No timer'}function timerProgress(e){if(e.secs)return Math.min(100,elapsed/e.secs*100);if(e.reps)return Math.min(100,currentRep/e.reps*100);return 0}function nextText(e){if(e.secs&&currentRound<(e.reps||1))return'Next round';if(!e.secs&&e.reps&&currentRep<e.reps)return'Next rep';return'Next exercise'}

function completeScreen(){let wd=weekDone(),sk=streak();root(`<div class="complete"><h1>✅ Routine complete</h1><div class="card" style="color:#111"><div class="name">Exercises: ${run.length}</div><div class="name" style="color:#16a34a;margin-top:8px">Streak: ${sk} day${sk===1?'':'s'}</div><div class="meta" style="margin-top:10px;font-weight:700;color:#111">This week: ${wd} / 7 days</div><div class="progress"><div class="fill" style="width:${wd/7*100}%"></div></div><div class="meta" style="margin-top:10px">Today is logged complete.</div></div><div style="margin-top:auto;display:grid;gap:8px"><button class="btn green" onclick="currentScreen='routine';render()">Done</button><button class="btn" onclick="currentScreen='calendar';render()">View calendar</button></div></div>`)}
function dateKey(d){let x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function todayKey(){return dateKey(new Date())}function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function isDone(k){return st.completedDates.includes(k)}function isHoliday(k){return st.holidayDates.includes(k)}
function addHolidayRange(start,end){let d=new Date(start+'T00:00:00'),e=new Date(end+'T00:00:00');while(d<=e){let k=dateKey(d);if(!st.holidayDates.includes(k))st.holidayDates.push(k);d=addDays(d,1)}}function syncHoliday(){if(st.holidayMode){st.holidayStart=st.holidayStart||todayKey();addHolidayRange(st.holidayStart,todayKey());save()}}function endHoliday(){if(st.holidayMode){addHolidayRange(st.holidayStart||todayKey(),todayKey());st.holidayMode=false;st.holidayStart='';save()}}function markToday(){endHoliday();let k=todayKey();if(!st.completedDates.includes(k))st.completedDates.push(k);save()}function toggleHoliday(){if(st.holidayMode)endHoliday();else{st.holidayMode=true;st.holidayStart=todayKey();addHolidayRange(todayKey(),todayKey());save()}render()}
function streak(){let d=new Date();if(!isDone(dateKey(d))&&!isHoliday(dateKey(d)))d=addDays(d,-1);let n=0;while(true){let k=dateKey(d);if(isDone(k)){n++;d=addDays(d,-1);continue}if(isHoliday(k)){d=addDays(d,-1);continue}break}return n}function weekStart(d=new Date()){let x=new Date(d),off=(x.getDay()+6)%7;x.setDate(x.getDate()-off);x.setHours(0,0,0,0);return x}function weekDone(){let s=weekStart(),n=0;for(let i=0;i<7;i++)if(isDone(dateKey(addDays(s,i))))n++;return n}
function completedCount(start,end){let n=0,d=new Date(start);while(d<=end){if(isDone(dateKey(d)))n++;d=addDays(d,1)}return n}function holidayCount(start,end){let n=0,d=new Date(start);while(d<=end){if(isHoliday(dateKey(d)))n++;d=addDays(d,1)}return n}
function ordinal(n){let s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}function longDate(d){return d.toLocaleDateString('en-GB',{weekday:'long'})+' '+ordinal(d.getDate())+' of '+d.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}function timeOnly(d){return d.toLocaleTimeString('en-GB',{hour:'numeric',minute:'2-digit'}).toLowerCase()}
function maybeMonday(){let today=new Date();if(today.getDay()!==1)return;let k=todayKey();if(localStorage.getItem('stretchfit_last_monday')===k)return;let ws=weekStart(today),ls=addDays(ws,-7),le=addDays(ws,-1),comp=completedCount(ls,le),hol=holidayCount(ls,le),miss=Math.max(0,7-comp-hol);setTimeout(()=>alert(`Weekly summary\n\nLast week:\nCompleted: ${comp} / 7 days\nHoliday/pause days: ${hol}\nMissed days: ${miss}\n\nCurrent streak: ${streak()} day${streak()===1?'':'s'}`),400);localStorage.setItem('stretchfit_last_monday',k)}

var EX_SAFE2_MAX_IMAGES=3,EX_SAFE2_MAX_EDGE=520,EX_SAFE2_QUALITY=.50,EX_SAFE2_MAX_DATA_CHARS=420000,exPhotoJobIdSafe2=0;

function fileToCompressedDataUrl(file){return new Promise((resolve,reject)=>{if(!file||!file.type||!file.type.startsWith('image/'))return reject(new Error('Choose an image file.'));let reader=new FileReader();reader.onerror=()=>reject(new Error('Could not read photo.'));reader.onload=()=>{let img=new Image();img.onerror=()=>reject(new Error('Could not process photo. Try a screenshot or smaller image.'));img.onload=()=>{try{let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(!w||!h)return reject(new Error('Could not process photo.'));let scale=Math.min(1,EX_SAFE2_MAX_EDGE/Math.max(w,h));let nw=Math.max(1,Math.round(w*scale)),nh=Math.max(1,Math.round(h*scale));let canvas=document.createElement('canvas');canvas.width=nw;canvas.height=nh;let ctx=canvas.getContext('2d',{alpha:false});ctx.fillStyle='#fff';ctx.fillRect(0,0,nw,nh);ctx.drawImage(img,0,0,nw,nh);let out=canvas.toDataURL('image/jpeg',EX_SAFE2_QUALITY);if(out.length>EX_SAFE2_MAX_DATA_CHARS){canvas.width=Math.max(1,Math.round(nw*.7));canvas.height=Math.max(1,Math.round(nh*.7));let ctx2=canvas.getContext('2d',{alpha:false});ctx2.fillStyle='#fff';ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.drawImage(img,0,0,canvas.width,canvas.height);out=canvas.toDataURL('image/jpeg',.38)}if(out.length>EX_SAFE2_MAX_DATA_CHARS)return reject(new Error('Photo is still too large after compression. Save without it, or use an image link.'));resolve(out)}catch(e){reject(new Error('Could not compress photo. Save without it, or use an image link.'))}};img.src=reader.result};reader.readAsDataURL(file)})}
async function loadFiles(input){let job=++exPhotoJobIdSafe2;let files=[...(input.files||[])].filter(f=>f.type&&f.type.startsWith('image/'));input.value='';if(!files.length)return;let room=EX_SAFE2_MAX_IMAGES-tempImages.length;if(room<=0){alert(`Maximum ${EX_SAFE2_MAX_IMAGES} photos per exercise. Remove one first.`);return}if(files.length>room){alert(`Only ${room} more photo${room===1?'':'s'} can be added.`);files=files.slice(0,room)}if(typeof exImageBusy!=='undefined')exImageBusy=files.length;updateImageStatus();for(const f of files){try{let data=await fileToCompressedDataUrl(f);if(job!==exPhotoJobIdSafe2)break;tempImages.push(data)}catch(e){if(job===exPhotoJobIdSafe2)alert(e&&e.message?e.message:'Could not add photo.')}finally{if(job===exPhotoJobIdSafe2){if(typeof exImageBusy!=='undefined')exImageBusy=Math.max(0,exImageBusy-1);updateImageStatus()}}}if(job===exPhotoJobIdSafe2){if(typeof exImageBusy!=='undefined')exImageBusy=0;updateImageStatus()}}
function saveStretchFitStateOrThrow(){localStorage.setItem('stretchfit_web_mood_v2',JSON.stringify(st))}
function safeSaveExerciseState(exerciseId){try{saveStretchFitStateOrThrow();return {ok:true,photosKept:true}}catch(err){days.forEach(d=>{((tab().days||{})[d]||[]).forEach(x=>{if(x.uid===exerciseId)x.images=[]})});try{saveStretchFitStateOrThrow();return {ok:true,photosKept:false}}catch(err2){return {ok:false,error:err2}}}}
function saveExercise(){let busy=(typeof exImageBusy!=='undefined'?exImageBusy:0);if(busy>0){alert('Photo is still processing. Wait a moment or tap Clear photos.');return}let selected=[...document.querySelectorAll('.dayCheck:checked')].map(x=>x.value);if(!selected.length){alert('Choose at least one day');return}let link=(document.getElementById('exLink')?.value||'').trim();let images=[...tempImages].filter(Boolean);if(link)images.push(link);let id=editingUid||uid();let ex={uid:id,name:(document.getElementById('exName')?.value||'').trim()||'Exercise',secs:+document.getElementById('exSecs')?.value||0,reps:+document.getElementById('exReps')?.value||0,notes:document.getElementById('exNotes')?.value||'',images};if(editingUid)days.forEach(d=>tab().days[d]=(tab().days[d]||[]).filter(x=>x.uid!==editingUid));selected.forEach(d=>{tab().days[d]=tab().days[d]||[];tab().days[d].push({...ex,images:[...images]})});let result=safeSaveExerciseState(id);if(!result.ok){alert('Could not save exercise because browser storage is full. Try deleting old exercise photos first.');return}editingUid=null;tempImages=[];if(typeof exImageBusy!=='undefined')exImageBusy=0;exPhotoJobIdSafe2++;if(!result.photosKept)alert('Exercise saved, but the photo was removed because browser storage was full.');render();setTimeout(()=>{try{scrollTo(0,document.body.scrollHeight)}catch(e){}},20)}
function edit(){let e=editingUid?findEx(editingUid):null;if(editingUid&&!e){editingUid=null;resetExercisePhotoState()}let sel=e?daysFor(editingUid):[days[dayIndex]],a=list();root(topHtml()+`<div class="content"><div class="card"><div class="name">Edit routine</div><input id="tabName" placeholder="Tab name" value="${esc(tab().name)}"><div class="tabManageBtns"><button class="tabActionBtn rename" onclick="renameTab()">Rename</button><button class="tabActionBtn delete" onclick="deleteTab()">Delete tab</button></div></div><div class="card" id="exerciseEditForm"><div class="name">${e?'Edit exercise':'Add exercise'}</div><input id="exName" placeholder="Exercise name" value="${esc(e?.name||'')}"><input id="exSecs" type="number" placeholder="Duration seconds, optional" value="${e?.secs||''}"><input id="exReps" type="number" placeholder="Reps / rounds, optional" value="${e?.reps||''}"><textarea id="exNotes" placeholder="Notes, optional">${esc(e?.notes||'')}</textarea><input id="exLink" placeholder="Image link, optional"><input id="exercisePhotoInput" type="file" accept="image/*" multiple onchange="loadFiles(this)"><div class="exercisePhotoTools"><button class="mini" type="button" onclick="clearExercisePhotos()">Clear photos</button></div><div id="imageStatus" class="small">${tempImages.length?tempImages.length+' attached photo'+(tempImages.length===1?'':'s'):'No photos attached'}</div><div id="imagePreview">${imagePreviewHtml()}</div><div class="exercisePhotoNote">Photos are optional. If your phone says a photo is too large, the exercise can still be saved without it.</div><div class="daychecks">${days.map(d=>`<label><input type="checkbox" class="dayCheck" value="${d}" ${sel.includes(d)?'checked':''}><span class="dayTick">✓</span><span class="dayText">${d}</span></label>`).join('')}</div><button class="btn green" onclick="saveExercise()">${e?'Save changes':'Add exercise'}</button>${e?`<button class="btn" style="margin-top:8px" onclick="openAddExercise()">Cancel edit</button>`:''}</div><div class="name" style="padding:6px 2px">This day</div>${a.length?a.map(card).join(''):`<div class="card">No exercises for this day yet.</div>`}</div><div class="bottom"><button class="btn dark" onclick="currentScreen='routine';editingUid=null;resetExercisePhotoState();render()">Close</button></div>`)}
function routine(){let a=list(),wd=weekDone(),sk=streak();root(topHtml()+`<div class="daybar"><button class="arrow" onclick="moveDay(-1)">‹</button><div class="day">${days[dayIndex]}</div><button class="arrow" onclick="moveDay(1)">›</button></div><div class="content"><div class="card"><div class="name">${esc(tab().name)}</div><div class="meta">Streak: ${sk} | This week: ${wd}/7</div></div>${a.length?a.map(card).join(''):`<div class="card">No exercises for ${days[dayIndex]}. Tap Edit to add some.</div>`}</div><div class="bottom"><button class="btn dark" onclick="openAddExercise()">Edit</button><button class="btn" onclick="currentScreen='calendar';render()">Calendar</button><button class="btn green" onclick="startRoutine()">Start</button></div>`)}

</script></body></html>
