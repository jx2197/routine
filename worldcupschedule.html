<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup 2026 Schedule</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; color: #111; }
    body { font-family: Arial, Helvetica, sans-serif; }
    main { height: 100vh; overflow-y: auto; padding: 10px 14px 30px; }
    .topbar { display: flex; justify-content: flex-end; padding: 4px 0 8px; }
    .reset-btn { border: 1px solid #bbb; border-radius: 8px; background: #fff; color: #111; padding: 7px 10px; font-weight: 700; }
    .day { border-bottom: 1px solid #e5e5e5; padding: 16px 0; }
    .day.today { scroll-margin-top: 10px; }
    .day-title { margin: 0 0 10px; font-size: 22px; font-weight: 700; }
    .games { min-height: 58px; display: grid; gap: 8px; padding: 2px 0; }
    .game {
      display: grid;
      grid-template-columns: 64px 1fr 116px 72px;
      gap: 10px;
      align-items: center;
      background: #fff;
      border: 2px solid #198754;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .game.record { border-color: #dc3545; }
    .game.watched { background: #f2f2f2; border-color: #aaa; color: #777; }
    .time { font-weight: 700; white-space: nowrap; }
    .teams { font-weight: 700; line-height: 1.25; }
    .stage { color: #666; font-size: 13px; margin-top: 2px; }
    .side { justify-self: end; text-align: right; }
    .pill {
      display: inline-block;
      white-space: nowrap;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      background: #198754;
      color: #fff;
    }
    .record .pill { background: #dc3545; }
    .channel { margin-top: 6px; font-size: 13px; font-weight: 700; color: #111; }
    .done { display: none; margin-top: 6px; font-size: 12px; font-weight: 700; color: #777; }
    .watched .stage, .watched .channel { color: #777; }
    .watched .pill { background: #777; }
    .watched .done { display: block; }
    .move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      justify-self: end;
    }
    .move-buttons button {
      width: 32px;
      height: 32px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .move-buttons button:disabled {
      opacity: .25;
      cursor: not-allowed;
    }
    @media (max-width: 650px) {
      main { padding: 8px 10px 24px; }
      .day-title { font-size: 20px; }
      .game { grid-template-columns: 54px 1fr 72px; gap: 8px; }
      .side { grid-column: 1 / 3; justify-self: start; text-align: left; }
      .move-buttons { grid-column: 3; grid-row: 2; }
    }
  </style>
</head>

    const STORE_KEY = 'wc26-spoiler-safe-daily-schedule-v11';
    const OLD_KEYS = [];
    const byId = Object.fromEntries(fixtures.map(f => [String(f.id), f]));

    const fmt = new Intl.DateTimeFormat('en-GB', {
      weekday: 'long', day: 'numeric', month: 'long', timeZone: 'UTC'
    });

    function utcDate(dateString) {
      const [y, m, d] = dateString.split('-').map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    function isoDate(date) { return date.toISOString().slice(0, 10); }

    function ukTodayIso() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Europe/London', year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(new Date());
      const values = Object.fromEntries(parts.map(part => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    }

    function addDays(dateString, offset) {
      const d = utcDate(dateString);
      d.setUTCDate(d.getUTCDate() + offset);
      return isoDate(d);
    }

    function dateRange(start, end) {
      const days = [];
      let d = utcDate(start);
      const last = utcDate(end);
      while (d <= last) {
        days.push(isoDate(d));
        d.setUTCDate(d.getUTCDate() + 1);
      }
      return days;
    }

    const allDays = dateRange(fixtures[0].date, fixtures[fixtures.length - 1].date);
    const todayIso = ukTodayIso();
    const keepFromIso = addDays(todayIso, -1);
    const visibleDays = allDays.filter(day => day >= keepFromIso);

    function defaultState() {
      const assigned = {};
      const order = {};
      const watched = {};
      const record = {};
      allDays.forEach(day => order[day] = []);
      fixtures.forEach(f => {
        const id = String(f.id);
        assigned[id] = f.date;
        watched[id] = false;
        record[id] = false;
        order[f.date].push(id);
      });
      return { assigned, order, watched, record };
    }

    function readSaved(key) {
      try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
    }

    function applySaved(base, saved) {
      if (!saved || typeof saved !== 'object') return base;

      if (saved.assigned && typeof saved.assigned === 'object') {
        fixtures.forEach(f => {
          const id = String(f.id);
          if (allDays.includes(saved.assigned[id])) base.assigned[id] = saved.assigned[id];
        });
      }

      if (saved.watched && typeof saved.watched === 'object') {
        fixtures.forEach(f => { base.watched[String(f.id)] = Boolean(saved.watched[String(f.id)]); });
      }

      if (saved.record && typeof saved.record === 'object') {
        fixtures.forEach(f => { base.record[String(f.id)] = Boolean(saved.record[String(f.id)]); });
      }

      if (saved.order && typeof saved.order === 'object') {
        allDays.forEach(day => base.order[day] = []);
        const seen = new Set();
        allDays.forEach(day => {
          const savedOrder = Array.isArray(saved.order[day]) ? saved.order[day].map(String) : [];
          savedOrder.forEach(id => {
            if (byId[id] && base.assigned[id] === day && !seen.has(id)) {
              base.order[day].push(id);
              seen.add(id);
            }
          });
        });
        fixtures.forEach(f => {
          const id = String(f.id);
          if (!seen.has(id)) base.order[base.assigned[id]].push(id);
        });
      } else {
        allDays.forEach(day => base.order[day] = []);
        fixtures.forEach(f => base.order[base.assigned[String(f.id)]].push(String(f.id)));
      }

      return base;
    }

    function loadState() {
      let state = defaultState();
      OLD_KEYS.forEach(key => state = applySaved(state, readSaved(key)));
      state = applySaved(state, readSaved(STORE_KEY));
      return state;
    }

    let state = loadState();
    sortAllDays();
    let tapTimer = null;
    let tapId = null;

    function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

    function removeFromOrders(id) {
      allDays.forEach(day => { state.order[day] = state.order[day].filter(x => x !== id); });
    }

    function sortDay(day) {
      if (!state.order[day]) return;
      state.order[day].sort((a, b) => {
        const fa = byId[String(a)];
        const fb = byId[String(b)];
        if (!fa || !fb) return 0;
        return fa.date.localeCompare(fb.date) || fa.time.localeCompare(fb.time) || Number(fa.id) - Number(fb.id);
      });
    }

    function sortAllDays() {
      allDays.forEach(sortDay);
    }

    function moveGame(id, targetDay, beforeId = null) {
      id = String(id);
      beforeId = beforeId ? String(beforeId) : null;
      if (!byId[id] || !allDays.includes(targetDay)) return;
      if (beforeId === id && state.assigned[id] === targetDay) return;

      removeFromOrders(id);
      state.assigned[id] = targetDay;

      state.order[targetDay].push(id);
      sortDay(targetDay);

      save();
      render();
    }

    function shiftGame(id, offset) {
      id = String(id);
      const currentDay = state.assigned[id];
      const currentIndex = visibleDays.indexOf(currentDay);
      if (currentIndex === -1) return;

      const targetIndex = currentIndex + offset;
      if (targetIndex < 0 || targetIndex >= visibleDays.length) return;

      state.record[id] = !state.record[id];
      moveGame(id, visibleDays[targetIndex]);
    }

    function handleTap(id) {
      id = String(id);
      if (tapTimer && tapId === id) {
        clearTimeout(tapTimer);
        tapTimer = null;
        tapId = null;
        toggleRecord(id);
        return;
      }

      clearTimeout(tapTimer);
      tapId = id;
      tapTimer = setTimeout(() => {
        toggleWatched(id);
        tapTimer = null;
        tapId = null;
      }, 260);
    }

    function toggleWatched(id) {
      id = String(id);
      if (!byId[id]) return;
      state.watched[id] = !state.watched[id];
      save();
      render();
    }

    function toggleRecord(id) {
      id = String(id);
      if (!byId[id]) return;
      state.record[id] = !state.record[id];
      save();
      render();
    }

    function makeGame(id) {
      const f = byId[String(id)];
      const record = Boolean(state.record[String(id)]);
      const watched = Boolean(state.watched[String(id)]);

      const row = document.createElement('div');
      row.className = 'game' + (record ? ' record' : '') + (watched ? ' watched' : '');
      row.dataset.id = String(id);

      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = f.time;

      const details = document.createElement('div');
      const teams = document.createElement('div');
      teams.className = 'teams';
      teams.textContent = f.teams;
      const stage = document.createElement('div');
      stage.className = 'stage';
      stage.textContent = f.stage;
      details.append(teams, stage);

      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.textContent = record ? 'ON DEMAND' : 'LIVE GAME';

      const channel = document.createElement('div');
      channel.className = 'channel';
      channel.textContent = f.channel || 'TBC';

      const done = document.createElement('div');
      done.className = 'done';
      done.textContent = 'DONE';

      const side = document.createElement('div');
      side.className = 'side';
      side.append(pill, channel, done);

      const currentDay = state.assigned[String(id)];
      const currentIndex = visibleDays.indexOf(currentDay);

      const up = document.createElement('button');
      up.type = 'button';
      up.textContent = '↑';
      up.title = 'Move to previous day';
      up.setAttribute('aria-label', 'Move game to previous day');
      up.disabled = currentIndex <= 0;
      up.addEventListener('pointerup', e => e.stopPropagation());
      up.addEventListener('click', e => {
        e.stopPropagation();
        shiftGame(String(id), -1);
      });

      const down = document.createElement('button');
      down.type = 'button';
      down.textContent = '↓';
      down.title = 'Move to next day';
      down.setAttribute('aria-label', 'Move game to next day');
      down.disabled = currentIndex === -1 || currentIndex >= visibleDays.length - 1;
      down.addEventListener('pointerup', e => e.stopPropagation());
      down.addEventListener('click', e => {
        e.stopPropagation();
        shiftGame(String(id), 1);
      });

      const controls = document.createElement('div');
      controls.className = 'move-buttons';
      controls.append(up, down);

      row.append(time, details, side, controls);
      row.addEventListener('pointerup', e => {
        if (e.target.closest('button')) return;
        handleTap(id);
      });
      row.addEventListener('contextmenu', e => e.preventDefault());
      return row;
    }

    function render() {
      sortAllDays();
      const schedule = document.getElementById('days');
      schedule.textContent = '';

      visibleDays.forEach(day => {
        const section = document.createElement('section');
        section.className = 'day' + (day === todayIso ? ' today' : '');
        section.dataset.date = day;

        const title = document.createElement('h2');
        title.className = 'day-title';
        title.textContent = fmt.format(utcDate(day));

        const list = document.createElement('div');
        list.className = 'games';
        list.dataset.day = day;

        (state.order[day] || []).forEach(id => list.appendChild(makeGame(id)));
        section.append(title, list);
        schedule.appendChild(section);
      });
    }

    function scrollToToday() {
      const todaySection = document.querySelector('.day.today');
      const firstVisibleSection = document.querySelector('.day');
      const target = todaySection || firstVisibleSection;
      if (target) target.scrollIntoView({ block: 'start' });
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      [
        STORE_KEY,
        'wc26-spoiler-safe-daily-schedule-v3',
        'wc26-spoiler-safe-daily-schedule-v4',
        'wc26-spoiler-safe-daily-schedule-v5',
        'wc26-spoiler-safe-daily-schedule-v6',
        'wc26-spoiler-safe-daily-schedule-v7',
        'wc26-spoiler-safe-daily-schedule-v8',
        'wc26-spoiler-safe-daily-schedule-v9',
        'wc26-spoiler-safe-daily-schedule-v10',
        'wc26-spoiler-safe-daily-schedule-v11'
      ].forEach(key => localStorage.removeItem(key));
      state = defaultState();
      save();
      render();
      requestAnimationFrame(scrollToToday);
    });

    render();
    requestAnimationFrame(scrollToToday);
  </script>
</body>
</html>
