<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#5421a8">
  <title>Commonwealth Games 2026 Schedule</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; color: #111; }
    body { font-family: Arial, Helvetica, sans-serif; }
    main { height: 100vh; overflow-y: auto; padding: 10px 14px 34px; }
    .topbar { position: sticky; top: 0; z-index: 5; display: flex; gap: 12px; align-items: center; justify-content: space-between; padding: 6px 0 9px; background: rgba(255,255,255,.97); border-bottom: 1px solid #eee; }
    .heading { min-width: 0; }
    h1 { margin: 0; font-size: 21px; line-height: 1.15; }
    .reset-btn { flex: 0 0 auto; border: 1px solid #bbb; border-radius: 8px; background: #fff; color: #111; padding: 7px 10px; font-weight: 700; cursor: pointer; }
    .day { border-bottom: 1px solid #e5e5e5; padding: 16px 0; scroll-margin-top: 76px; }
    .day-title { margin: 0 0 10px; font-size: 22px; font-weight: 700; }
    .games { min-height: 58px; display: grid; gap: 8px; padding: 2px 0; }
    .game {
      display: grid;
      grid-template-columns: 112px 1fr 126px 102px;
      gap: 10px;
      align-items: center;
      background: #fff;
      border: 2px solid #5421a8;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .game:focus-visible { outline: 3px solid #ef4aa8; outline-offset: 2px; }
    .game.record { border-color: #dc3545; }
    .game.watched { background: #f2f2f2; border-color: #aaa; color: #777; }
    .time { font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .teams { font-weight: 700; line-height: 1.25; }
    .stage { color: #666; font-size: 13px; margin-top: 2px; }
    .side { justify-self: end; text-align: right; }
    .pill { display: inline-block; white-space: nowrap; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 700; background: #5421a8; color: #fff; }
    .medal .pill { background: #ef4aa8; }
    .record .pill { background: #dc3545; }
    .done { display: none; margin-top: 6px; font-size: 12px; font-weight: 700; color: #777; }
    .watched .stage { color: #777; }
    .watched .pill { background: #777; }
    .watched .done { display: block; }
    .move-buttons { display: grid; grid-template-columns: repeat(3, 30px); gap: 4px; justify-self: end; }
    .move-buttons button { width: 30px; height: 32px; border: 1px solid #bbb; border-radius: 8px; background: #fff; color: #111; font-size: 18px; font-weight: 700; cursor: pointer; }
    .move-buttons button:disabled { opacity: .25; cursor: not-allowed; }
    .move-buttons .delete-btn { color: #b42318; border-color: #e6a6a6; }
    .empty { color: #777; font-size: 13px; padding: 8px 0; }
    footer { padding: 17px 0 5px; color: #666; font-size: 12px; line-height: 1.45; }
    footer a { color: #5421a8; }
    @media (max-width: 720px) {
      main { padding: 8px 10px 28px; }
      h1 { font-size: 18px; }
      .day-title { font-size: 20px; }
      .game { grid-template-columns: 102px 1fr 98px; gap: 8px; }
      .side { grid-column: 1 / 3; justify-self: start; text-align: left; }
      .move-buttons { grid-column: 3; grid-row: 2; }
    }
    @media (max-width: 430px) {
      .game { grid-template-columns: 94px 1fr 94px; padding: 9px; }
      .time { font-size: 13px; }
      .teams { font-size: 14px; }
      .stage { font-size: 12px; }
    }
  </style>
</head>

    </footer>

alse,"kind":"SPORT"},{"id":34,"date":"2026-08-01","time":"10:00-13:45","stage":"Session 11 · EDF Scotstoun Stadium","teams":"Athletics & Para Athletics","medal":true,"kind":"SPORT"},{"id":75,"date":"2026-08-01","time":"11:00-14:00","stage":"Session 3 · SEC Centre Hall 4","teams":"Judo","medal":false,"kind":"SPORT"},{"id":71,"date":"2026-08-01","time":"11:00-14:30","stage":"Session 16 · SEC Centre Hall 5","teams":"Boxing","medal":true,"kind":"SPORT"},{"id":97,"date":"2026-08-01","time":"13:00-15:00","stage":"Session 19 · The Hydro","teams":"Netball","medal":false,"kind":"SPORT"},{"id":119,"date":"2026-08-01","time":"15:00-19:00","stage":"Session 6 · Sir Chris Hoy Velodrome","teams":"Track Cycling & Para Track Cycling","medal":true,"kind":"SPORT"},{"id":54,"date":"2026-08-01","time":"15:00-21:55","stage":"Session 19 · SEC Centre Hall 3","teams":"Bowls & Para Bowls","medal":false,"kind":"SPORT"},{"id":76,"date":"2026-08-01","time":"16:00-18:45","stage":"Session 4 · SEC Centre Hall 4","teams":"Judo","medal":true,"kind":"SPORT"},{"id":72,"date":"2026-08-01","time":"16:30-20:00","stage":"Session 17 · SEC Centre Hall 5","teams":"Boxing","medal":true,"kind":"SPORT"},{"id":35,"date":"2026-08-01","time":"18:30-22:30","stage":"Session 12 · EDF Scotstoun Stadium","teams":"Athletics & Para Athletics","medal":true,"kind":"SPORT"},{"id":98,"date":"2026-08-02","time":"09:00-11:00","stage":"Session 20 · The Hydro","teams":"Netball","medal":true,"kind":"SPORT"},{"id":120,"date":"2026-08-02","time":"09:00-13:00","stage":"Session 7 · Sir Chris Hoy Velodrome","teams":"Track Cycling & Para Track Cycling","medal":true,"kind":"SPORT"},{"id":55,"date":"2026-08-02","time":"09:00-15:15","stage":"Session 20 · SEC Centre Hall 3","teams":"Bowls & Para Bowls","medal":true,"kind":"SPORT"},{"id":77,"date":"2026-08-02","time":"10:00-13:00","stage":"Session 5 · SEC Centre Hall 4","teams":"Judo","medal":false,"kind":"SPORT"},{"id":99,"date":"2026-08-02","time":"13:00-15:00","stage":"Session 21 · The Hydro","teams":"Netball","medal":true,"kind":"SPORT"},{"id":78,"date":"2026-08-02","time":"15:00-17:45","stage":"Session 6 · SEC Centre Hall 4","teams":"Judo","medal":true,"kind":"SPORT"},{"id":121,"date":"2026-08-02","time":"15:00-17:45","stage":"Session 8 · Sir Chris Hoy Velodrome","teams":"Track Cycling & Para Track Cycling","medal":true,"kind":"SPORT"},{"id":2,"date":"2026-08-02","time":"TBC","stage":"Venue TBC","teams":"Closing Ceremony","medal":true,"kind":"CEREMONY"}];
    const STORE_KEY = 'cwg26-spoiler-safe-daily-schedule-v1';
    const byId = Object.fromEntries(fixtures.map(f => [String(f.id), f]));
    const fmt = new Intl.DateTimeFormat('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    let tapTimer = null;
    let tapId = null;

    function utcDate(iso) {
      const [y,m,d] = iso.split('-').map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }
    function isoDate(d) { return d.toISOString().slice(0, 10); }
    function ukTodayIso() {
      const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/London', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(new Date());
      const value = Object.fromEntries(parts.map(p => [p.type, p.value]));
      return `${value.year}-${value.month}-${value.day}`;
    }
    function addDays(iso, amount) {
      const d = utcDate(iso);
      d.setUTCDate(d.getUTCDate() + amount);
      return isoDate(d);
    }
    function dateRange(start, end) {
      const days = [];
      let d = utcDate(start);
      const last = utcDate(end);
      while (d <= last) { days.push(isoDate(d)); d.setUTCDate(d.getUTCDate() + 1); }
      return days;
    }
    const allDays = dateRange('2026-07-23', '2026-08-02');
    const todayIso = ukTodayIso();
    const keepFromIso = addDays(todayIso, -1);
    const filteredDays = allDays.filter(day => day >= keepFromIso);
    const visibleDays = filteredDays.length ? filteredDays : allDays;

    function defaultState() {
      const assigned = {}, order = {}, watched = {}, record = {}, deleted = {};
      allDays.forEach(day => order[day] = []);
      fixtures.forEach(f => {
        const id = String(f.id);
        assigned[id] = f.date;
        watched[id] = false;
        record[id] = false;
        deleted[id] = false;
        order[f.date].push(id);
      });
      return { assigned, order, watched, record, deleted };
    }
    function readSaved() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; }
    }
    function applySaved(base, saved) {
      if (!saved || typeof saved !== 'object') return base;
      fixtures.forEach(f => {
        const id = String(f.id);
        if (saved.assigned && allDays.includes(saved.assigned[id])) base.assigned[id] = saved.assigned[id];
        if (saved.watched) base.watched[id] = Boolean(saved.watched[id]);
        if (saved.record) base.record[id] = Boolean(saved.record[id]);
        if (saved.deleted) base.deleted[id] = Boolean(saved.deleted[id]);
      });
      allDays.forEach(day => base.order[day] = []);
      const seen = new Set();
      allDays.forEach(day => {
        const savedOrder = saved.order && Array.isArray(saved.order[day]) ? saved.order[day].map(String) : [];
        savedOrder.forEach(id => {
          if (byId[id] && base.assigned[id] === day && !base.deleted[id] && !seen.has(id)) { base.order[day].push(id); seen.add(id); }
        });
      });
      fixtures.forEach(f => {
        const id = String(f.id), day = base.assigned[id];
        if (!base.deleted[id] && !seen.has(id) && allDays.includes(day)) base.order[day].push(id);
      });
      return base;
    }
    let state = applySaved(defaultState(), readSaved());
    function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {} }
    function startMinutes(time) {
      const value = String(time || '').trim();
      if (!value || value.toUpperCase() === 'TBC') return Number.MAX_SAFE_INTEGER;

      // Supports the schedule's 24-hour times and also 7pm / 7:30pm if added later.
      const twelveHour = value.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
      if (twelveHour) {
        let hour = Number(twelveHour[1]) % 12;
        if (twelveHour[3].toLowerCase() === 'pm') hour += 12;
        return hour * 60 + Number(twelveHour[2] || 0);
      }

      const twentyFourHour = value.match(/^(\d{1,2}):(\d{2})/);
      return twentyFourHour
        ? Number(twentyFourHour[1]) * 60 + Number(twentyFourHour[2])
        : Number.MAX_SAFE_INTEGER;
    }
    function compareByOriginalDateTime(a, b) {
      const fa = byId[a], fb = byId[b];
      return fa.date.localeCompare(fb.date)
        || startMinutes(fa.time) - startMinutes(fb.time)
        || fa.teams.localeCompare(fb.teams)
        || fa.id - fb.id;
    }
    function sortAllDays() {
      // Group cards by the day chosen with the arrows, but order each group
      // using the event's original scheduled date first and start time second.
      allDays.forEach(day => { state.order[day] = []; });
      fixtures.forEach(f => {
        const id = String(f.id);
        const day = state.assigned[id];
        if (!state.deleted[id] && allDays.includes(day)) state.order[day].push(id);
      });
      allDays.forEach(day => state.order[day].sort(compareByOriginalDateTime));
    }
    function moveGame(id, targetDay) {
      id = String(id);
      const oldDay = state.assigned[id];
      if (!oldDay || !state.order[oldDay] || !state.order[targetDay]) return;
      state.order[oldDay] = state.order[oldDay].filter(x => x !== id);
      state.assigned[id] = targetDay;
      state.order[targetDay].push(id);
      sortAllDays();
      save(); render();
    }
    function shiftGame(id, offset) {
      id = String(id);
      const currentDay = state.assigned[id];
      const currentIndex = visibleDays.indexOf(currentDay);
      const targetIndex = currentIndex + offset;
      if (currentIndex === -1 || targetIndex < 0 || targetIndex >= visibleDays.length) return;
      state.record[id] = true;
      moveGame(id, visibleDays[targetIndex]);
    }
    function deleteGame(id) {
      id = String(id);
      const f = byId[id], day = state.assigned[id];
      if (!f || !day) return;
      if (!window.confirm(`Remove ${f.teams} from your schedule?`)) return;
      state.deleted[id] = true;
      state.order[day] = (state.order[day] || []).filter(x => x !== id);
      save(); render();
    }
    function toggleWatched(id) {
      id = String(id); if (!byId[id]) return;
      state.watched[id] = !state.watched[id]; save(); render();
    }
    function toggleRecord(id) {
      id = String(id); if (!byId[id]) return;
      state.record[id] = !state.record[id]; save(); render();
    }
    function handleTap(id) {
      id = String(id);
      if (tapTimer && tapId === id) {
        clearTimeout(tapTimer); tapTimer = null; tapId = null; toggleRecord(id); return;
      }
      clearTimeout(tapTimer); tapId = id;
      tapTimer = setTimeout(() => { toggleWatched(id); tapTimer = null; tapId = null; }, 260);
    }
    function makeGame(id) {
      const f = byId[String(id)];
      const record = Boolean(state.record[String(id)]), watched = Boolean(state.watched[String(id)]);
      const row = document.createElement('div');
      row.className = 'game' + (f.medal ? ' medal' : '') + (record ? ' record' : '') + (watched ? ' watched' : '');
      row.dataset.id = String(id); row.tabIndex = 0; row.setAttribute('role','button');
      row.setAttribute('aria-label', `${f.time}, ${f.teams}, ${f.stage}`);
      const time = document.createElement('div'); time.className = 'time'; time.textContent = f.time;
      const details = document.createElement('div');
      const teams = document.createElement('div'); teams.className = 'teams'; teams.textContent = f.teams;
      const stage = document.createElement('div'); stage.className = 'stage'; stage.textContent = f.stage;
      details.append(teams, stage);
      const pill = document.createElement('div'); pill.className = 'pill'; pill.textContent = record ? 'ON DEMAND' : (f.medal ? 'MEDAL' : 'LIVE');
      const done = document.createElement('div'); done.className = 'done'; done.textContent = 'DONE';
      const side = document.createElement('div'); side.className = 'side'; side.append(pill, done);
      const currentDay = state.assigned[String(id)], currentIndex = visibleDays.indexOf(currentDay);
      const up = document.createElement('button'); up.type = 'button'; up.textContent = '↑'; up.title = 'Move to previous day'; up.setAttribute('aria-label','Move session to previous day'); up.disabled = currentIndex <= 0;
      up.addEventListener('pointerup', e => e.stopPropagation()); up.addEventListener('click', e => { e.stopPropagation(); shiftGame(String(id), -1); });
      const down = document.createElement('button'); down.type = 'button'; down.textContent = '↓'; down.title = 'Move to next day'; down.setAttribute('aria-label','Move session to next day'); down.disabled = currentIndex === -1 || currentIndex >= visibleDays.length - 1;
      down.addEventListener('pointerup', e => e.stopPropagation()); down.addEventListener('click', e => { e.stopPropagation(); shiftGame(String(id), 1); });
      const remove = document.createElement('button'); remove.type = 'button'; remove.textContent = '×'; remove.className = 'delete-btn'; remove.title = 'Remove this session'; remove.setAttribute('aria-label', `Remove ${f.teams} from schedule`);
      remove.addEventListener('pointerup', e => e.stopPropagation()); remove.addEventListener('click', e => { e.stopPropagation(); deleteGame(String(id)); });
      const controls = document.createElement('div'); controls.className = 'move-buttons'; controls.append(up, down, remove);
      row.append(time, details, side, controls);
      row.addEventListener('pointerup', e => { if (!e.target.closest('button')) handleTap(id); });
      row.addEventListener('keydown', e => { if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('button')) { e.preventDefault(); toggleWatched(id); } });
      row.addEventListener('contextmenu', e => e.preventDefault());
      return row;
    }
    function render() {
      sortAllDays();
      const schedule = document.getElementById('days'); schedule.textContent = '';
      visibleDays.forEach(day => {
        const section = document.createElement('section'); section.className = 'day' + (day === todayIso ? ' today' : ''); section.dataset.date = day;
        const title = document.createElement('h2'); title.className = 'day-title'; title.textContent = fmt.format(utcDate(day));
        const list = document.createElement('div'); list.className = 'games'; list.dataset.day = day;
        const ids = state.order[day] || [];
        if (ids.length) ids.forEach(id => list.appendChild(makeGame(id)));
        else { const empty = document.createElement('div'); empty.className = 'empty'; empty.textContent = 'No sessions'; list.appendChild(empty); }
        section.append(title, list); schedule.appendChild(section);
      });
    }
    function scrollToToday() {
      const target = document.querySelector('.day.today');
      if (target) target.scrollIntoView({ block: 'start' });
    }
    document.getElementById('resetBtn').addEventListener('click', () => {
      try { localStorage.removeItem(STORE_KEY); } catch {}
      state = defaultState(); save(); render(); requestAnimationFrame(scrollToToday);
    });
    render(); requestAnimationFrame(scrollToToday);
  </script>
